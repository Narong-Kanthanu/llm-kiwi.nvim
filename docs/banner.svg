<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="llm-kiwi.nvim — knowledge graphs for your markdown vaults">
  <title>llm-kiwi.nvim</title>
  <desc>A flat kiwifruit cross-section paired with the llm-kiwi.nvim wordmark.</desc>

  <!-- Dark background matching the plugin's graph theme -->
  <rect width="1200" height="300" fill="#1a2332"/>

  <!-- Kiwi cross-section: flat design, concentric rings -->
  <g transform="translate(170, 150)">
    <!-- Brown skin -->
    <circle r="108" fill="#6b3e1e"/>
    <!-- Bright yellow inner rim -->
    <circle r="94" fill="#f0dd3a"/>
    <!-- Green flesh -->
    <circle r="88" fill="#9fc834"/>
    <!-- Pale-green radial rays from the center outward (12 rays, 30° apart) -->
    <g stroke="#d4e873" stroke-width="4.5" stroke-linecap="round" fill="none">
      <line x1="0"     y1="-32"   x2="0"     y2="-78"/>
      <line x1="16"    y1="-27.7" x2="39"    y2="-67.5"/>
      <line x1="27.7"  y1="-16"   x2="67.5"  y2="-39"/>
      <line x1="32"    y1="0"     x2="78"    y2="0"/>
      <line x1="27.7"  y1="16"    x2="67.5"  y2="39"/>
      <line x1="16"    y1="27.7"  x2="39"    y2="67.5"/>
      <line x1="0"     y1="32"    x2="0"     y2="78"/>
      <line x1="-16"   y1="27.7"  x2="-39"   y2="67.5"/>
      <line x1="-27.7" y1="16"    x2="-67.5" y2="39"/>
      <line x1="-32"   y1="0"     x2="-78"   y2="0"/>
      <line x1="-27.7" y1="-16"   x2="-67.5" y2="-39"/>
      <line x1="-16"   y1="-27.7" x2="-39"   y2="-67.5"/>
    </g>
    <!-- Pale-green center -->
    <circle r="30" fill="#d4e873"/>
    <!-- Seed ring: 14 navy seeds at r=55, rotated to point radially outward -->
    <g fill="#141b3d">
      <ellipse cx="0"     cy="-55"   rx="4" ry="7"/>
      <ellipse cx="23.9"  cy="-49.5" rx="4" ry="7" transform="rotate(25.7 23.9 -49.5)"/>
      <ellipse cx="43"    cy="-34.3" rx="4" ry="7" transform="rotate(51.4 43 -34.3)"/>
      <ellipse cx="53.6"  cy="-12.3" rx="4" ry="7" transform="rotate(77.1 53.6 -12.3)"/>
      <ellipse cx="53.6"  cy="12.3"  rx="4" ry="7" transform="rotate(102.9 53.6 12.3)"/>
      <ellipse cx="43"    cy="34.3"  rx="4" ry="7" transform="rotate(128.6 43 34.3)"/>
      <ellipse cx="23.9"  cy="49.5"  rx="4" ry="7" transform="rotate(154.3 23.9 49.5)"/>
      <ellipse cx="0"     cy="55"    rx="4" ry="7" transform="rotate(180 0 55)"/>
      <ellipse cx="-23.9" cy="49.5"  rx="4" ry="7" transform="rotate(205.7 -23.9 49.5)"/>
      <ellipse cx="-43"   cy="34.3"  rx="4" ry="7" transform="rotate(231.4 -43 34.3)"/>
      <ellipse cx="-53.6" cy="12.3"  rx="4" ry="7" transform="rotate(257.1 -53.6 12.3)"/>
      <ellipse cx="-53.6" cy="-12.3" rx="4" ry="7" transform="rotate(282.9 -53.6 -12.3)"/>
      <ellipse cx="-43"   cy="-34.3" rx="4" ry="7" transform="rotate(308.6 -43 -34.3)"/>
      <ellipse cx="-23.9" cy="-49.5" rx="4" ry="7" transform="rotate(334.3 -23.9 -49.5)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="335" y="185" font-size="140" font-weight="700" fill="#e8eef5" letter-spacing="-2">
      llm-kiwi<tspan font-size="90" font-weight="400" fill="#79a8eb" letter-spacing="0">.nvim</tspan>
    </text>
    <text x="338" y="230" font-size="22" font-weight="400" fill="#6a8a9a" letter-spacing="1.2">
      Knowledge graphs for your markdown vaults
    </text>
  </g>
</svg>
