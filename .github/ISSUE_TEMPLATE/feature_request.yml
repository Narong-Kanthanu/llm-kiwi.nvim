name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! This project aims to stay small and
        focused, so please explain the problem first — not just the
        proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the plugin makes hard today?
    validations:
      required: true

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: What would the API, command, or behavior look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or existing workarounds.

  - type: dropdown
    id: pr-willing
    attributes:
      label: Would you be willing to submit a PR?
      options:
        - "Yes, I'd like to implement it"
        - "Yes, with guidance"
        - "No, just suggesting"
    validations:
      required: true
