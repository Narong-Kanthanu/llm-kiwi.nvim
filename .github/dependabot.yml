version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      pip-minor-and-patch:
        update-types:
          - minor
          - patch
